<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Adicionar Pessoa</title>
    <link rel="stylesheet" th:href="@{/css/styleAdd.css}" />
</head>
<body>
<h1>Adicionar Nova Pessoa</h1>
<div class="form-container">
    <div th:if="${msg}" class="mensagem" th:text="${msg}"></div>
    <form th:action="@{/pessoas/ui/salvar}" th:object="${pessoa}" method="post">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" th:field="*{nome}" required />

        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}" required />

        <label for="imgUrl">URL da Imagem:</label>
        <input type="text" id="imgUrl" th:field="*{imgUrl}" required />

        <label for="idade">Idade:</label>
        <input type="number" id="idade" th:field="*{idade}" required />

        <label for="rank">Telefone:</label>
        <input type="text" id="rank" th:field="*{telefone}" />

        <button type="submit">Cadastrar Pessoa</button>
    </form>
    <a th:href="@{/pessoas/ui/listar}">Voltar para a lista de pessoas</a>
</div>
</body>
</html>
